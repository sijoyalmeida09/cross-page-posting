name: Deploy to Hostinger via SSH

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Deploy via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        password: ${{ secrets.SSH_PASSWORD }}
        port: ${{ secrets.SSH_PORT }}
        script: |
          mkdir -p ~/domains/joshoit.com/public_html/hub.joshoit.com/servlet-demo/
          rsync -avz --delete live-demo/ ~/domains/joshoit.com/public_html/hub.joshoit.com/servlet-demo/live-demo/
          rsync -avz --delete java-servlet/ ~/domains/joshoit.com/public_html/hub.joshoit.com/servlet-demo/java-servlet/
